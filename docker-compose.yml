version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: aegis_user
      POSTGRES_PASSWORD: aegis_password
      POSTGRES_DB: aegis_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - aegis_net

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - aegis_net

  aegis-core:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    depends_on:
      - postgres
      - redis
    environment:
      - DATABASE_URL=postgresql://aegis_user:aegis_password@postgres:5432/aegis_db
      - REDIS_URL=redis://redis:6379/0
    networks:
      - aegis_net

volumes:
  pgdata:

networks:
  aegis_net:
    driver: bridge